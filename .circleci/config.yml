version: 2
jobs:
  build:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
        name: Fix SSH key permissions
        command: |
          chmod 600 ~/.ssh/id_rsa
          chmod 644 ~/.ssh/id_rsa.pub
          ls -la ~/.ssh/
      - run:
          name: Upgrade git
          command: |
            sudo apt-get update
            sudo apt-get install -y git
      - run:
          name: Install-npm
          command: npm install
      - restore_cache:
          key: dependency-cache-{{ checksum "package.json" }}
      - save_cache:
          key: dependency-cache-{{ checksum "package.json" }}
          paths:
            - ./node_modules
      - run:
          name: Test
          command: npm run test
      - store_artifacts:
          path: test-results.xml
          prefix: tests
      - store_artifacts:
          path: coverage
          prefix: coverage
      - store_test_results:
          path: test-results.xml
      - run:
          name: Deploy to FTP
          command: node deploy.js

workflows:
  version: 2
  deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - master